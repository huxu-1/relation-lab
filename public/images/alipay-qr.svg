<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="white" rx="20"/>

  <!-- Top Banner -->
  <rect width="400" height="80" fill="url(#bg)" rx="20"/>
  <rect y="60" width="400" height="20" fill="url(#bg)"/>

  <!-- Logo -->
  <rect x="20" y="20" width="40" height="40" fill="white" rx="10"/>
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4F46E5" text-anchor="middle">R</text>

  <!-- Title -->
  <text x="75" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">关系研究所</text>
  <text x="75" y="58" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.8">支付宝扫码付款 ¥9.9</text>

  <!-- QR Code Placeholder Area -->
  <rect x="100" y="110" width="200" height="200" fill="#F3F4F6" rx="12" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Placeholder Icon -->
  <rect x="170" y="160" width="60" height="60" fill="#D1D5DB" rx="8"/>
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">QR</text>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">请替换为真实收款码</text>
  <text x="200" y="268" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">alipay-qr.png</text>

  <!-- Amount Badge -->
  <rect x="140" y="330" width="120" height="36" fill="#4F46E5" rx="18"/>
  <text x="200" y="354" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">¥ 9.90</text>

  <!-- Bottom Text -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">关系研究所 · 专业情感关系测评平台</text>
</svg>
